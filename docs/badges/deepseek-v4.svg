    </g>
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text x="1590" y="150" fill-opacity=".8" filter="url(#blur)" textLength="210">Max</text>
        <text x="1590" y="150" fill-opacity=".3" textLength="210">Max</text>
      </g>
      <text x="1590" y="140" textLength="210">Max</text>
    </g>
