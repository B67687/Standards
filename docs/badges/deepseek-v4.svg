<svg xmlns="http://www.w3.org/2000/svg" width="180" height="20" role="img" aria-label="DeepSeek V4 Flash: Max">
  <title>DeepSeek V4 Flash: Max</title>
  <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
  <clipPath id="r"><rect width="180" height="20" rx="3"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="139" height="20" fill="#555"/>
    <rect x="139" width="41" height="20" fill="#4f46e5"/>
    <rect width="180" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text x="690" y="150" fill-opacity=".8" filter="url(#blur)" textLength="1190">DeepSeek V4 Flash</text>
        <text x="690" y="150" fill-opacity=".3" textLength="1190">DeepSeek V4 Flash</text>
