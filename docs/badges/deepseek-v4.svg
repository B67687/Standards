      </g>
      <text x="380" y="140" textLength="560">DeepSeek</text>
    </g>
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text x="930" y="150" fill-opacity=".8" filter="url(#blur)" textLength="140">V4</text>
        <text x="930" y="150" fill-opacity=".3" textLength="140">V4</text>
      </g>
      <text x="930" y="140" textLength="140">V4</text>
    </g>
