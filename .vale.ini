# Vale configuration — prose linter
# See: https://vale.sh/docs/

# Core settings
StylesPath = .vale/styles
MinAlertLevel = warning

# Packages to install: vale install write-good
# Or use built-in: https://vale.sh/docs/topics/packages/

# File globs to check
[*.md]
BasedOnStyles = write-good

# American English rules from write-good
write-good.Economical = YES
write-good.Illusions = YES
write-good.Weasel = YES
write-good.Passive = YES
write-good.ThereIs = YES
write-good.So = YES
write-good.Adverbs = YES
write-good.Clichés = YES
write-good.E-Prime = NO  # Allow "to be" forms

# Exclusions
[CHANGELOG.md]
BasedOnStyles = {}
