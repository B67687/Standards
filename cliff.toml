# cliff.toml — git-cliff changelog configuration
# See: https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog header
header = """
# Changelog\n
"""
# Template for a version
body = """
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}\n
"""
# Template for the footer
footer = """
<!-- generated by git-cliff -->
"""
# Post-process release notes
postprocessors = [
  { pattern = '<[^>]*>', replace = "" },  # Remove HTML tags
]
# Sort commits
sort = "newest"

[git]
# Conventional commit parsing
conventional_commits = true
# Filter commits by type (uncomment to limit)
# commit_types = ["feat", "fix", "docs", "refactor", "perf", "test", "chore", "cleanup", "security", "revert"]
# Process these scopes specially
# Skip merge commits
skip_merges = true
